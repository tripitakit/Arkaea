name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  MIX_ENV: test
  OTP_VERSION: "28.1.1"
  ELIXIR_VERSION: "1.19.3-otp-28"

jobs:
  test:
    name: Build · Format · Credo · Test · Dialyzer
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: arkea

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: arkea/deps
          key: ${{ runner.os }}-mix-deps-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('arkea/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-deps-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: arkea/_build
          key: ${{ runner.os }}-mix-build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('arkea/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Cache Dialyzer PLT
        uses: actions/cache@v4
        with:
          path: arkea/priv/plts
          key: ${{ runner.os }}-dialyzer-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('arkea/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-dialyzer-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Install deps
        run: mix deps.get --only test

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo (strict)
        run: mix credo --strict

      - name: Run tests
        run: mix test

      - name: Dialyzer
        run: mix dialyzer
